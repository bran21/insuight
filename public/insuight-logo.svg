<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Main gradient: indigo → purple -->
    <linearGradient id="main" x1="80" y1="40" x2="432" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <!-- Lighter highlight gradient -->
    <linearGradient id="hi" x1="160" y1="60" x2="352" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <!-- Shadow gradient for depth -->
    <linearGradient id="shadow" x1="256" y1="180" x2="256" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3b0764" stop-opacity="0.4"/>
    </linearGradient>
    <!-- Tentacle gradient -->
    <linearGradient id="tent" x1="256" y1="280" x2="256" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.7"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft inner shadow -->
    <filter id="inner">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset dx="0" dy="3" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
  </defs>

  <!-- === TENTACLES (drawn behind the head) === -->
  <!-- Outer-left tentacle -->
  <path d="M148 310 C120 370, 95 430, 105 465 C110 480, 125 485, 132 472 C140 458, 130 430, 140 390 C148 360, 150 340, 148 310"
        fill="url(#tent)" opacity="0.9"/>
  <!-- Inner-left tentacle -->
  <path d="M195 340 C185 395, 178 440, 188 468 C193 482, 208 482, 210 468 C214 450, 200 420, 198 385 C196 365, 196 350, 195 340"
        fill="url(#tent)" opacity="0.85"/>
  <!-- Inner-right tentacle -->
  <path d="M317 340 C327 395, 334 440, 324 468 C319 482, 304 482, 302 468 C298 450, 312 420, 314 385 C316 365, 316 350, 317 340"
        fill="url(#tent)" opacity="0.85"/>
  <!-- Outer-right tentacle -->
  <path d="M364 310 C392 370, 417 430, 407 465 C402 480, 387 485, 380 472 C372 458, 382 430, 372 390 C364 360, 362 340, 364 310"
        fill="url(#tent)" opacity="0.9"/>
  <!-- Far-left tentacle (curling) -->
  <path d="M130 290 C90 340, 65 400, 78 445 C84 462, 100 465, 105 450 C112 430, 95 395, 110 355 C122 325, 128 305, 130 290"
        fill="url(#tent)" opacity="0.75"/>
  <!-- Far-right tentacle (curling) -->
  <path d="M382 290 C422 340, 447 400, 434 445 C428 462, 412 465, 407 450 C400 430, 417 395, 402 355 C390 325, 384 305, 382 290"
        fill="url(#tent)" opacity="0.75"/>

  <!-- Tentacle suction cups (small dots for detail) -->
  <circle cx="118" cy="400" r="4" fill="#a78bfa" opacity="0.4"/>
  <circle cx="125" cy="420" r="3.5" fill="#a78bfa" opacity="0.35"/>
  <circle cx="112" cy="440" r="3" fill="#a78bfa" opacity="0.3"/>
  <circle cx="192" cy="420" r="3.5" fill="#a78bfa" opacity="0.35"/>
  <circle cx="196" cy="445" r="3" fill="#a78bfa" opacity="0.3"/>
  <circle cx="316" cy="420" r="3.5" fill="#a78bfa" opacity="0.35"/>
  <circle cx="312" cy="445" r="3" fill="#a78bfa" opacity="0.3"/>
  <circle cx="394" cy="400" r="4" fill="#a78bfa" opacity="0.4"/>
  <circle cx="387" cy="420" r="3.5" fill="#a78bfa" opacity="0.35"/>
  <circle cx="400" cy="440" r="3" fill="#a78bfa" opacity="0.3"/>

  <!-- === HEAD === -->
  <!-- Head shape (rounded dome) -->
  <ellipse cx="256" cy="200" rx="130" ry="150" fill="url(#main)" filter="url(#inner)"/>
  <!-- Highlight overlay on head -->
  <ellipse cx="240" cy="160" rx="90" ry="100" fill="url(#hi)"/>
  <!-- Shadow on lower head -->
  <ellipse cx="256" cy="260" rx="120" ry="90" fill="url(#shadow)"/>

  <!-- Head spots / texture -->
  <circle cx="200" cy="130" r="8" fill="#818cf8" opacity="0.15"/>
  <circle cx="310" cy="140" r="6" fill="#818cf8" opacity="0.12"/>
  <circle cx="230" cy="110" r="5" fill="#a78bfa" opacity="0.1"/>
  <circle cx="290" cy="120" r="4" fill="#a78bfa" opacity="0.1"/>

  <!-- === EYES === -->
  <!-- Eye whites (slightly oval) -->
  <ellipse cx="210" cy="210" rx="28" ry="32" fill="white" filter="url(#glow)"/>
  <ellipse cx="302" cy="210" rx="28" ry="32" fill="white" filter="url(#glow)"/>

  <!-- Irises -->
  <ellipse cx="215" cy="213" rx="16" ry="18" fill="#1e1b4b"/>
  <ellipse cx="307" cy="213" rx="16" ry="18" fill="#1e1b4b"/>

  <!-- Pupils -->
  <ellipse cx="218" cy="211" rx="8" ry="9" fill="#0f0a2a"/>
  <ellipse cx="310" cy="211" rx="8" ry="9" fill="#0f0a2a"/>

  <!-- Eye shine (specular highlights) -->
  <circle cx="222" cy="204" r="5" fill="white" opacity="0.9"/>
  <circle cx="314" cy="204" r="5" fill="white" opacity="0.9"/>
  <circle cx="212" cy="218" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="304" cy="218" r="2.5" fill="white" opacity="0.5"/>

  <!-- === MOUTH (friendly smile) === -->
  <path d="M232 260 Q256 280 280 260" stroke="#4c1d95" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Cheek blush -->
  <ellipse cx="185" cy="248" rx="16" ry="10" fill="#c084fc" opacity="0.15"/>
  <ellipse cx="327" cy="248" rx="16" ry="10" fill="#c084fc" opacity="0.15"/>
</svg>
